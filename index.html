<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bar Racer</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="hud" aria-label="Diagrammstatus">
        <div>
          <p class="eyebrow">Bar Racer</p>
          <h1>Automarken nach Marktanteil</h1>
        </div>
        <div class="stats">
          <span>Jahr <strong id="year">2019</strong></span>
          <span>Fuehrend <strong id="leader">Toyota 10.2%</strong></span>
        </div>
      </section>

      <canvas id="chart" width="1120" height="630" aria-label="Animiertes Balkendiagramm fuer Automarken"></canvas>

      <footer class="controls" aria-label="Diagrammsteuerung">
        <button id="playToggle" type="button">Pause</button>
        <button id="resetButton" type="button">Reset</button>
        <span>Demo-Daten: globale Marktanteile in Prozent</span>
      </footer>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
