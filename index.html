<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bar Racer</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="hud" aria-label="Game status">
        <div>
          <p class="eyebrow">Bar Racer</p>
          <h1>Stay in the lane.</h1>
        </div>
        <div class="stats">
          <span>Score <strong id="score">0</strong></span>
          <span>Best <strong id="best">0</strong></span>
        </div>
      </section>

      <canvas id="game" width="960" height="540" aria-label="Bar Racer game canvas"></canvas>

      <footer class="controls">
        <span>Move: W/S or Arrow keys</span>
        <span>Restart: Space</span>
      </footer>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
